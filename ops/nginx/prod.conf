# LiveQuiz production HTTP nginx config.
# Use this for IP-only demos or when TLS is terminated before this container.
# For direct HTTPS, set NGINX_CONF=prod.tls.conf and add docker-compose.tls.yml.
# CORS is still handled in FastAPI (do NOT add Access-Control-* here).

worker_processes auto;
events {
  worker_connections 2048;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  client_max_body_size 1m;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript application/wasm image/svg+xml;

  # Hardening
  server_tokens off;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline'" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  upstream api_backend {
    least_conn;
    server api-a:8000;
    server api-b:8000;
  }

  upstream frontend_backend {
    server frontend:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://api_backend/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location /ws/ {
      proxy_pass http://api_backend/ws/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location / {
      proxy_pass http://frontend_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
