# Promtail — tails every compose container's stdout and ships to Loki (P10).
#
# Our services log one JSON object per line; a `json` pipeline stage pulls a
# couple of low-cardinality fields up as Loki stream labels (`service`,
# `level`) and leaves `request_id` / `trace_id` inside the line, where
#   {service="api"} | json | request_id="req_..."
# matches them and the Loki datasource's derived field turns trace_id into a
# link to Tempo. Keeping those two ids OUT of the label set is deliberate —
# they're unbounded, and high-cardinality labels are what blow up Loki.
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            request_id: request_id
            trace_id: trace_id
            log_ts: timestamp
            message: message
      - labels:
          service:
          level:
      - timestamp:
          source: log_ts
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.999999Z07:00"
