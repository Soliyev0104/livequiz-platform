apiVersion: 1

providers:
  - name: livequiz
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Mounted from ./ops/observability/grafana/dashboards in docker-compose.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
